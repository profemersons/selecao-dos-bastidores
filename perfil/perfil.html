<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Operação Copa - Perfil</title>

    <link rel="stylesheet" href="perfil.css">
    


    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../menu/menu.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

    <div id="loading">
        Carregando perfil...
    </div>

    <div id="app" style="display:none">

        <header class="header">

            <div class="player">

                <div class="avatar" id="playerEmoji">
                    😀
                </div>

                <div>

                    <h2 id="playerName"></h2>

                    <p id="playerCourse"></p>

                </div>

            </div>

        </header>

        <main class="content">

            <div class="card">

                <h3>🎟 Seu Código</h3>

                <div class="big-code" id="playerCode"></div>

            </div>

            <div class="card">

                <h3>📱 Meu QR Code</h3>

                <div id="qrcode"></div>

            </div>

            <div class="card">

                <h3>📊 Estatísticas</h3>

                <div class="stats">

                    <div class="stat">
                        <span id="uniqueStickers">0</span>
                        <small>Únicas</small>
                    </div>

                    <div class="stat">
                        <span id="shinyStickers">0</span>
                        <small>Brilhantes</small>
                    </div>

                    <div class="stat">
                        <span id="totalStickers">0</span>
                        <small>Total</small>
                    </div>
                    <div class="stat">
                        <span id="pointsCount">0</span>
                        <small>Pontos</small>
                    </div>
                    <div class="stat">
                        <span id="friendsCount">0</span>
                        <small>Amigos</small>
                    </div>


                    <div class="stat">
                        <span id="tradesCount">0</span>
                        <small>Trocas</small>
                    </div>



                </div>

            </div>

            <div class="card">

                <h3>🤝 Amigos</h3>

                <p>
                    <span id="friendsCountCard">0</span>
                    amigos cadastrados
                </p>

                <div class="friend-actions">

                    <button id="addFriendBtn">
                        ➕ Adicionar amigo
                    </button>

                    <button id="viewFriendsBtn">
                        📋 Ver lista
                    </button>

                </div>

            </div>

            <div class="card">

                <h3>⚙️ Conta</h3>

                <button id="logoutBtn">
                    🚪 Sair da conta
                </button>

            </div>

        </main>

    </div>

    <nav class="menu-bar">

        <button onclick="goAlbum()">
            <span>📖</span>
            <small>Álbum</small>
        </button>

        <button onclick="goPacks()">
            <span>📦</span>
            <small>Pacotes</small>
        </button>

        <button onclick="goMissions()">
            <span>🎯</span>
            <small>Missões</small>
        </button>

        <button class="center-btn" onclick="goTrades()">
            <span>🔁</span>
            <small>Trocas</small>
        </button>

        <button onclick="goProfile()">
            <span>👤</span>
            <small>Perfil</small>
        </button>

    </nav>

    <!-- MODAL LISTA -->

    <div id="friendsListModal" class="modal hidden">

        <div class="modal-content">

            <h3>🤝 Seus Amigos</h3>

            <div id="friendsList"></div>

            <button onclick="closeFriendsList()">
                Fechar
            </button>

        </div>

    </div>

    <!-- MODAL ADICIONAR AMIGO -->

    <div id="friendModal" class="modal hidden">

        <div class="modal-content">

            <h3>➕ Adicionar amigo</h3>

            <input id="friendCode" type="text" placeholder="Digite o código do amigo">

            <button onclick="addFriend()">
                Adicionar
            </button>

            <button onclick="closeFriendModal()">
                Cancelar
            </button>

        </div>

    </div>

    <script src="../config.js"></script>
    <script src="../menu/menu.js"></script>
    <script src="../shared/stats.js"></script>
    <script src="perfil.js"></script>

</body>

</html>
